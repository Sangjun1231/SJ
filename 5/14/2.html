<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유형 테스트 - 전체 질문</title>
 <link rel="stylesheet" href="css/2.css">
</head>
<body>

    <header class="header">
        <p class="subtitle">FIND YOUR TYPE</p>
        <h1 class="title">나와 가까운 유형은?</h1>
        <p class="description">각 질문에서 더 가까운 보기를 골라보세요. 답변 옆의 유형명을 직접 메모해 두세요.</p>
    </header>

    <main class="test-container">
        <section class="question-section">
            <span class="q-number">Q 01</span>
            <h2 class="q-text">작업을 시작할 때 나는?</h2>
            <div class="answer-group">
                <button class="answer-card">
                    <span class="choice">A</span>
                    <p class="answer-text">전체 구조와 순서를 먼저 정리한다</p>
                    <span class="type-tag">구조 설계형</span>
                </button>
                <button class="answer-card">
                    <span class="choice">B</span>
                    <p class="answer-text">떠오르는 이미지나 분위기부터 잡아본다</p>
                    <span class="type-tag">감각 시각화형</span>
                </button>
            </div>
        </section>


        <section class="question-section">
            <span class="q-number">Q 02</span>
            <h2 class="q-text">아이디어가 막힐 때 나는?</h2>
            <div class="answer-group">
                <button class="answer-card">
                    <span class="choice">A</span>
                    <p class="answer-text">자료를 정리하며 기준을 다시 세운다</p>
                    <span class="type-tag">구조 설계형</span>
                </button>
                <button class="answer-card">
                    <span class="choice">B</span>
                    <p class="answer-text">새로운 조합이나 낯선 방식으로 시도해본다</p>
                    <span class="type-tag">실험 탐색형</span>
                </button>
            </div>
        </section>

      
        <section class="question-section">
            <span class="q-number">Q 03</span>
            <h2 class="q-text">팀 작업에서 내가 편한 역할은?</h2>
            <div class="answer-group">
                <button class="answer-card">
                    <span class="choice">A</span>
                    <p class="answer-text">자료와 의견을 정리하고 방향을 잡는 역할</p>
                    <span class="type-tag">구조 설계형</span>
                </button>
                <button class="answer-card">
                    <span class="choice">B</span>
                    <p class="answer-text">비주얼 톤과 그래픽 분위기를 제안하는 역할</p>
                    <span class="type-tag">감각 시각화형</span>
                </button>
            </div>
        </section>

        
        <section class="question-section">
            <span class="q-number">Q 04</span>
            <h2 class="q-text">결과물을 볼 때 가장 먼저 보는 것은?</h2>
            <div class="answer-group">
                <button class="answer-card">
                    <span class="choice">A</span>
                    <p class="answer-text">색감, 이미지, 분위기</p>
                    <span class="type-tag">감각 시각화형</span>
                </button>
                <button class="answer-card">
                    <span class="choice">B</span>
                    <p class="answer-text">정렬, 여백, 마감 상태</p>
                    <span class="type-tag">디테일 완성형</span>
                </button>
            </div>
        </section>

        
        <footer class="info-footer">
            <p>답변 옆에 적힌 유형명을 직접 세어본 뒤, 아래 자가진단 결과 확인표에서 나와 가까운 유형을 확인해보세요.</p>
        </footer>
    </main>

</body>
</html>
